name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Pre-Commit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install pre-commit
          # Caching pip
          pip install --cache-dir ~/.cache/pip
      - name: Run Pre-Commit
        run: pre-commit run --all-files