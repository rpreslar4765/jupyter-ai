name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        # Exit code 5 means "no tests collected" — treat as success for meta-packages.
        set +e
        pytest --tb=short -q
        pytest_exit=$?
        set -e
        if [ "${pytest_exit}" -eq 5 ]; then
          echo "No tests collected (meta-package — expected)."
        elif [ "${pytest_exit}" -ne 0 ]; then
          exit "${pytest_exit}"
        fi

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install pre-commit
      run: |
        pip install pre-commit

    - name: Run Lint
      run: |
        pre-commit run --all-files
      continue-on-error: true
